<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <title>Signature Generator - Topaz Gulf</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-color: #f8fafc;
      --card-bg: #ffffff;
      --card-border: rgba(15, 23, 42, 0.08);
      --text-primary: #0f172a;
      --text-secondary: #475569;
      --accent-color: #1884b2;
      --accent-glow: rgba(24, 132, 178, 0.08);
      --font-main: 'Plus Jakarta Sans', sans-serif;
      --font-ar: 'Cairo', sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    /* Smooth transitions for interactive elements */
    .btn, .btn-secondary, input, .language-toggle, .email-client-btn {
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }

    body {
      font-family: var(--font-main);
      background-color: var(--bg-color);
      background-image: 
        radial-gradient(circle at 20% 20%, rgba(24, 132, 178, 0.06) 0%, transparent 40%),
        radial-gradient(circle at 80% 80%, rgba(24, 132, 178, 0.04) 0%, transparent 50%);
      background-attachment: fixed;
      padding: 40px 20px;
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--text-primary);
    }

    body[dir="rtl"] {
      font-family: var(--font-ar), var(--font-main);
    }

    .app-container {
      width: 100%;
      max-width: 1100px;
      display: flex;
      flex-direction: column;
      gap: 30px;
      position: relative;
      z-index: 1;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 10px;
    }

    h1 {
      font-size: 32px;
      font-weight: 700;
      margin: 0;
      background: linear-gradient(180deg, #0f172a 0%, #334155 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.02em;
    }

    body[dir="rtl"] h1 {
      font-weight: 700;
    }

    .language-toggle {
      background: rgba(15, 23, 42, 0.04);
      border: 1px solid var(--card-border);
      border-radius: 99px;
      padding: 8px 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      font-weight: 500;
      color: var(--text-primary);
    }

    .language-toggle:hover {
      background: rgba(15, 23, 42, 0.08);
      border-color: rgba(15, 23, 42, 0.15);
      transform: translateY(-2px);
    }

    .language-toggle img {
      width: 20px;
      height: 20px;
    }

    /* Bento Grid Layout */
    .bento-grid {
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 24px;
      width: 100%;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .bento-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 20px;
      padding: 30px;
      position: relative;
      overflow: hidden;
      box-shadow: 0 10px 30px -10px rgba(15, 23, 42, 0.04);
      animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .bento-card:nth-child(1) {
      animation-delay: 0.1s;
    }
    
    .bento-card:nth-child(2) {
      animation-delay: 0.2s;
    }

    .bento-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(15, 23, 42, 0.05), transparent);
    }

    .bento-card.preview-panel {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      border-color: rgba(24, 132, 178, 0.2);
      box-shadow: 0 10px 40px -10px var(--accent-glow);
    }

    .card-title {
      font-size: 18px;
      font-weight: 600;
      margin-top: 0;
      margin-bottom: 20px;
      color: var(--text-primary);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .form-group.full-width {
      grid-column: span 2;
    }

    label {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-secondary);
      letter-spacing: 0.02em;
    }

    input {
      background: #f8fafc;
      border: 1px solid var(--card-border);
      border-radius: 10px;
      padding: 12px 16px;
      color: var(--text-primary);
      font-family: inherit;
      font-size: 14px;
      width: 100%;
    }

    input:focus {
      outline: none;
      border-color: var(--accent-color);
      background: #ffffff;
      box-shadow: 0 0 12px var(--accent-glow);
      transform: translateY(-1px);
    }

    /* Email client shortcut buttons */
    .email-client-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: #ffffff;
      border: 1px solid var(--card-border);
      box-shadow: 0 2px 6px rgba(0,0,0,0.05);
    }

    .email-client-btn:hover {
      transform: translateY(-3px) scale(1.1);
      box-shadow: 0 6px 15px rgba(0,0,0,0.08);
      border-color: rgba(24, 132, 178, 0.3);
    }

    .preview-container-wrapper {
      background: transparent;
      border: 1px dashed rgba(15, 23, 42, 0.1);
      border-radius: 12px;
      padding: 24px;
      min-height: 260px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 24px;
      overflow-x: auto;
      width: 100%;
    }

    .copy-actions {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .btn {
      background: var(--accent-color);
      color: white;
      border: none;
      border-radius: 10px;
      padding: 14px 24px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn:hover {
      background: #1e9dce;
      transform: translateY(-2px);
      box-shadow: 0 4px 20px var(--accent-glow);
    }

    .btn:active {
      transform: translateY(0);
    }

    .btn-secondary {
      background: #f1f5f9;
      border: 1px solid var(--card-border);
      color: var(--text-primary);
    }

    .btn-secondary:hover {
      background: #e2e8f0;
      border-color: rgba(15, 23, 42, 0.15);
    }

    /* Toast Notification */
    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: #10b981;
      color: white;
      padding: 14px 24px;
      border-radius: 12px;
      font-weight: 600;
      font-size: 14px;
      box-shadow: 0 10px 30px rgba(16, 185, 129, 0.3);
      display: flex;
      align-items: center;
      gap: 8px;
      transform: translateY(100px);
      opacity: 0;
      z-index: 1000;
    }

    .toast.show {
      transform: translateY(0);
      opacity: 1;
    }

    /* Responsive */
    @media (max-width: 900px) {
      .bento-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 600px) {
      header {
        padding: 0 4px;
      }
      header img {
        height: 36px !important;
      }
      .language-toggle {
        padding: 6px 12px;
        font-size: 13px;
      }
      .form-grid {
        grid-template-columns: 1fr;
        gap: 14px;
      }
      .form-group.full-width {
        grid-column: span 1;
      }
      body {
        padding: 16px 10px;
      }
      .bento-card {
        padding: 18px 14px;
        border-radius: 16px;
      }
      h1 {
        font-size: 26px;
      }
      .preview-container-wrapper {
        padding: 10px;
        min-height: auto;
      }
    }
  </style>
</head>

<body>
  <div class="app-container">
    <header>
      <img src="logo.png" alt="Topaz Gulf" style="height: 48px; width: auto;" />
      <button class="language-toggle" id="languageToggle">
        <img id="languageIcon" src="https://i.imgur.com/h5riSbC.png" alt="Lang" />
        <span id="languageText">العربية</span>

    </header>

    <div class="bento-grid">
      <!-- Form Panel -->
      <div class="bento-card">
        <h3 class="card-title" id="formTitle">Employee Details</h3>
        <form id="signatureForm" autocomplete="off">
          <div class="form-grid">
            <div class="form-group">

            </div>
            <div class="form-group">
              <label id="lblEmployeePosition">Position</label>
              <input type="text" id="employeePosition" value="IT Manager" required />
            </div>
            <div class="form-group">
              <label id="lblExtension">Extension (Ext.)</label>
              <input type="text" id="extension" value="109" pattern="[0-9]+" />
            </div>
            <div class="form-group">
              <label id="lblPhoneNumber">Phone Number (Optional)</label>
              <input type="text" id="phoneNumber" value="966581452387" />
            </div>
            <div class="form-group">
              <label id="lblWhatsappNumber">WhatsApp (Optional)</label>
              <input type="text" id="whatsappNumber" value="966581452387" />
            </div>
            <div class="form-group">
              <label id="lblEmailAddress">Email Address</label>
              <input type="email" id="emailAddress" value="aturaik@topazgulf.com" required />
            </div>
            <div class="form-group full-width">
              <label id="lblAddress">City / Country</label>
              <input type="text" id="address" value="Jubail, Industrial City, Saudi Arabia" required />
            </div>
          </div>
        </form>
      </div>

      <!-- Preview Panel -->
      <div class="bento-card preview-panel">
        <div>
          <h3 class="card-title" id="previewTitle">Live Preview</h3>
          <div class="preview-container-wrapper">
            <div id="signaturePreview"></div>
          </div>
        </div>

        <div class="copy-actions">
          <button class="btn" id="btnCopySignature">
            <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3"/></svg>
            <span id="btnCopyText">Copy Signature</span>
          </button>
          <button class="btn btn-secondary" id="btnCopyHtml">
            <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"/></svg>
            <span id="btnCopyHtmlText">Copy HTML Code</span>
          </button>
        </div>

        <div style="margin-top: 20px; border-top: 1px solid var(--card-border); padding-top: 16px;">
          <p id="emailClientsTitle" style="font-size: 12px; font-weight: 600; color: var(--text-secondary); margin: 0 0 10px 0; text-align: center;">Use signature in your email client:</p>
          <div style="display: flex; justify-content: center; gap: 15px;">
            <a href="https://mail.google.com/mail/u/0/#settings/general" target="_blank" title="Gmail" class="email-client-btn">
              <img src="https://cdn-icons-png.flaticon.com/512/732/732200.png" alt="Gmail" style="width: 20px; height: 20px;" />
            </a>
            <a href="https://outlook.live.com/mail/0/options/mail/layout" target="_blank" title="Outlook" class="email-client-btn">
              <img src="https://cdn-icons-png.flaticon.com/512/732/732223.png" alt="Outlook" style="width: 20px; height: 20px;" />
            </a>
            <a href="https://mail.yahoo.com/" target="_blank" title="Yahoo Mail" class="email-client-btn">
              <img src="https://cdn-icons-png.flaticon.com/512/732/732262.png" alt="Yahoo" style="width: 20px; height: 20px;" />
            </a>
          </div>
        </div>
      </div>
    </div>
    <footer id="pageFooter" style="text-align: center; font-size: 11px; color: var(--text-secondary); margin-top: 10px; opacity: 0.7; letter-spacing: 0.03em;"></footer>
  </div>

  <div class="toast" id="toastMessage">
    <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M5 13l4 4L19 7"/></svg>
    <span id="toastText">Copied Successfully!</span>
  </div>

  <script>
    const translations = {
      en: {
        formTitle: 'Employee Details',
        previewTitle: 'Live Preview',
        lblEmployeeName: 'Employee Name:',
        lblEmployeePosition: 'Position:',
        lblExtension: 'Extension (Ext.):',
        lblPhoneNumber: 'Phone Number (Optional):',
        lblWhatsappNumber: 'WhatsApp Number (Optional):',
        lblEmailAddress: 'Email Address:',
        lblAddress: 'City / Country:',
        btnCopySignature: 'Copy Signature',
        btnCopyHtml: 'Copy HTML Code',
        toastCopied: 'Copied to clipboard!',
        langBtnText: 'العربية',
        footerText: 'Created by <a href="https://wa.me/201114885388" target="_blank" style="color: var(--accent-color); text-decoration: none; font-weight: 600;">Khattab</a>',
        emailClientsTitle: 'Quick setup in your email client:',
        dir: 'ltr'
      },
      ar: {
        formTitle: 'بيانات الموظف',
        previewTitle: 'معاينة حية',
        lblEmployeeName: 'اسم الموظف:',
        lblEmployeePosition: 'المسمى الوظيفي:',
        lblExtension: 'رقم التحويلة:',
        lblPhoneNumber: 'رقم الهاتف (اختياري):',
        lblWhatsappNumber: 'رقم الواتساب (اختياري):',
        lblEmailAddress: 'البريد الإلكتروني:',
        lblAddress: 'المدينة / الدولة:',
        btnCopySignature: 'نسخ التوقيع',
        btnCopyHtml: 'نسخ كود HTML',
        toastCopied: 'تم النسخ بنجاح!',
        langBtnText: 'English',
        footerText: 'تم الإنشاء بواسطة <a href="https://wa.me/201114885388" target="_blank" style="color: var(--accent-color); text-decoration: none; font-weight: 600;">Khattab</a>',
        emailClientsTitle: 'إعداد سريع في بريدك الإلكتروني:',
        dir: 'rtl'
      }
    }

    let currentLang = navigator.language.startsWith('ar') ? 'ar' : 'en';

    function setLanguage(lang) {
      currentLang = lang;
      const trans = translations[lang];
      
      document.body.setAttribute('dir', trans.dir);
      document.getElementById('formTitle').textContent = trans.formTitle;
      document.getElementById('previewTitle').textContent = trans.previewTitle;
      
      document.getElementById('lblEmployeeName').textContent = trans.lblEmployeeName;
      document.getElementById('lblEmployeePosition').textContent = trans.lblEmployeePosition;
      document.getElementById('lblExtension').textContent = trans.lblExtension;
      document.getElementById('lblPhoneNumber').textContent = trans.lblPhoneNumber;
      document.getElementById('lblWhatsappNumber').textContent = trans.lblWhatsappNumber;
      document.getElementById('lblEmailAddress').textContent = trans.lblEmailAddress;
      document.getElementById('lblAddress').textContent = trans.lblAddress;
      
      document.getElementById('btnCopyText').textContent = trans.btnCopySignature;
      document.getElementById('btnCopyHtmlText').textContent = trans.btnCopyHtml;
      document.getElementById('languageText').textContent = trans.langBtnText;
      document.getElementById('pageFooter').innerHTML = trans.footerText;
      document.getElementById('emailClientsTitle').textContent = trans.emailClientsTitle;
      
      const languageIcon = document.getElementById('languageIcon');
      languageIcon.src = lang === 'en' ? 'https://i.imgur.com/h5riSbC.png' : 'https://i.imgur.com/YFQUbaf.png';
      
      generateSignature();
    }

    document.getElementById('languageToggle').addEventListener('click', () => {
      setLanguage(currentLang === 'en' ? 'ar' : 'en');
    });

    function cleanPhoneNumber(number) {
      if (!number) return '';
      return number.replace(/\s+/g, '').replace(/^[+]/, '');
    }

    function formatNumberForLink(number) {
      return '+' + cleanPhoneNumber(number);
    }

    function formatTextForHTML(text) {
      if (!text) return '';
      return text.split('').map((char, index, arr) => {
        let span = `<span style="color: #898795; text-decoration: none;">${char}</span>`;
        return index < arr.length - 1 ? span + '‌' : span;
      }).join('');
    }

    function generateSignature() {
      const employeeName = document.getElementById('employeeName').value.trim() || 'Employee Name';
      const employeePosition = document.getElementById('employeePosition').value.trim() || 'Position';
      const extension = document.getElementById('extension').value.trim();
      const phoneNumber = document.getElementById('phoneNumber').value.trim();
      const whatsappNumber = document.getElementById('whatsappNumber').value.trim();
      const address = document.getElementById('address').value.trim() || 'City, Country';
      const emailAddress = document.getElementById('emailAddress').value.trim() || 'email@topazgulf.com';

      const mobileNumber = '966133418811';
      const cleanWhatsappNumber = whatsappNumber ? formatNumberForLink(whatsappNumber) : '';

      const formattedMobileNumberHTML = formatTextForHTML(mobileNumber);
      const formattedPhoneNumberHTML = phoneNumber ? formatTextForHTML(phoneNumber) : '';
      const formattedEmailHTML = formatTextForHTML(emailAddress);

      const mobileDisplay = `Tel: ${formattedMobileNumberHTML}${extension ? ` Ext. ${extension}` : ''}`;
      const phoneDisplay = phoneNumber ? `Mobile: ${formattedPhoneNumberHTML}` : '';

      let signatureHTML = `
<table border="0" cellpadding="0" cellspacing="0" style="font-family: Arial, sans-serif; font-size: 12px; color: #898795; width: 320px; direction: ltr; border-collapse: collapse; margin-left: 0px !important; margin-right: auto !important; float: none !important; clear: both;">
  <tr>
    <td style="padding-bottom: 8px;">
      <a href="https://topazgulf.com" target="_blank" style="text-decoration: none;">
        <img src="https://lbxcvaosseqfqkpriwnv.supabase.co/storage/v1/object/public/signatures/main-logo.png" alt="Topaz Gulf Logo" style="width: 270px; height: auto; display: block; border: 0;" />
      </a>
    </td>
  </tr>
  <tr>
    <td style="font-family: Arial, sans-serif; font-size: 14px; color: #1884b2; font-weight: 600; padding-bottom: 6px;">
      ${employeeName} | ${employeePosition}
    </td>
  </tr>
  <tr>
    <td style="padding-bottom: 2px;">
      <table border="0" cellpadding="0" cellspacing="0" style="border-collapse: collapse;">
        <tr>
          <td style="padding-right: 8px; vertical-align: middle;">
            <img src="https://lbxcvaosseqfqkpriwnv.supabase.co/storage/v1/object/public/signatures/phone-icon.png" alt="Phone" style="width: 14px; height: 14px; display: block; border: 0;" />
          </td>
          <td style="font-family: Arial, sans-serif; font-size: 11px; color: #898795; line-height: 14px; vertical-align: middle;">
            ${mobileDisplay}
          </td>
        </tr>
      </table>
    </td>
  </tr>
`;

      if (phoneNumber) {
        signatureHTML += `
  <tr>
    <td style="padding-bottom: 2px;">
      <table border="0" cellpadding="0" cellspacing="0" style="border-collapse: collapse;">
        <tr>
          <td style="padding-right: 8px; vertical-align: middle;">
            <img src="https://lbxcvaosseqfqkpriwnv.supabase.co/storage/v1/object/public/signatures/mobile-icon.png" alt="Mobile" style="width: 14px; height: 14px; display: block; border: 0;" />
          </td>
          <td style="font-family: Arial, sans-serif; font-size: 11px; color: #898795; line-height: 14px; vertical-align: middle;">
            ${phoneDisplay}
          </td>
        </tr>
      </table>
    </td>
  </tr>
`;
      }

      signatureHTML += `
  <tr>
    <td style="padding-bottom: 2px;">
      <table border="0" cellpadding="0" cellspacing="0" style="border-collapse: collapse;">
        <tr>
          <td style="padding-right: 8px; vertical-align: middle;">
            <img src="https://lbxcvaosseqfqkpriwnv.supabase.co/storage/v1/object/public/signatures/address-icon.png" alt="Address" style="width: 14px; height: 14px; display: block; border: 0;" />
          </td>
          <td style="font-family: Arial, sans-serif; font-size: 11px; color: #898795; line-height: 14px; vertical-align: middle;">
            ${address}
          </td>
        </tr>
      </table>
    </td>
  </tr>
  <tr>
    <td style="padding-bottom: 2px;">
      <table border="0" cellpadding="0" cellspacing="0" style="border-collapse: collapse;">
        <tr>
          <td style="padding-right: 8px; vertical-align: middle;">
            <a href="mailto:${emailAddress}" style="text-decoration: none;">
              <img src="https://lbxcvaosseqfqkpriwnv.supabase.co/storage/v1/object/public/signatures/email-icon.png" alt="Email" style="width: 14px; height: 14px; display: block; border: 0;" />
            </a>
          </td>
          <td style="font-family: Arial, sans-serif; font-size: 11px; color: #898795; line-height: 14px; vertical-align: middle;">
            ${formattedEmailHTML}
          </td>
        </tr>
      </table>
    </td>
  </tr>
`;

      if (cleanWhatsappNumber) {
        signatureHTML += `
  <tr>
    <td style="padding-bottom: 4px;">
      <table border="0" cellpadding="0" cellspacing="0" style="border-collapse: collapse;">
        <tr>
          <td style="padding-right: 8px; vertical-align: middle;">
            <a href="https://wa.me/${cleanWhatsappNumber}" target="_blank" style="text-decoration: none;">
              <img src="https://lbxcvaosseqfqkpriwnv.supabase.co/storage/v1/object/public/signatures/whatsapp-icon.png" alt="WhatsApp" style="width: 14px; height: 14px; display: block; border: 0;" />
            </a>
          </td>
          <td style="font-family: Arial, sans-serif; font-size: 11px; color: #898795; line-height: 14px; vertical-align: middle;">
            WhatsApp Me
          </td>
        </tr>
      </table>
    </td>
  </tr>
`;
      }

      signatureHTML += `
  <tr>
    <td style="padding-top: 4px;">
      <a href="https://topazgulf.com" target="_blank" style="font-family: Arial, sans-serif; font-size: 11px; color: #898795; text-decoration: none; border: 1px solid rgba(24, 132, 178, 0.25); padding: 4px 8px; border-radius: 6px; font-weight: 500; display: inline-block;">
        <img src="https://lbxcvaosseqfqkpriwnv.supabase.co/storage/v1/object/public/signatures/website-icon.png" alt="Website" style="width: 10px; height: 10px; vertical-align: middle; border: 0; margin-right: 4px;" />
        <span style="vertical-align: middle;">topazgulf.com</span>
      </a>
    </td>
  </tr>

`;

      document.getElementById('signaturePreview').innerHTML = signatureHTML;
    }

    // Realtime changes
    const inputs = ['employeeName', 'employeePosition', 'extension', 'phoneNumber', 'whatsappNumber', 'emailAddress', 'address'];
    inputs.forEach(id => {
      document.getElementById(id).addEventListener('input', generateSignature);
    });

    // Copy Toast helper
    function showToast() {
      const toast = document.getElementById('toastMessage');
      toast.querySelector('span').textContent = translations[currentLang].toastCopied;
      toast.classList.add('show');
      setTimeout(() => {
        toast.classList.remove('show');
      }, 2500);
    }

    // Copy Signature Rich Text (for Outlook / Gmail client paste)
    document.getElementById('btnCopySignature').addEventListener('click', () => {
      const previewDiv = document.getElementById('signaturePreview');
      const range = document.createRange();
      range.selectNodeContents(previewDiv);
      const selection = window.getSelection();
      selection.removeAllRanges();
      selection.addRange(range);

      try {
        const successful = document.execCommand('copy');
        if (successful) {
          showToast();
        }
      } catch (err) {
        console.error(err);
      }
      selection.removeAllRanges();
    });

    // Copy HTML Source Code
    document.getElementById('btnCopyHtml').addEventListener('click', () => {
      const htmlContent = document.getElementById('signaturePreview').innerHTML;
      navigator.clipboard.writeText(htmlContent.trim()).then(() => {
        showToast();
      }).catch(err => {
        console.error(err);
      });
    });

    // Initialize default lang
    setLanguage(currentLang);
  </script>
